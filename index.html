<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>스마트 평가 시스템</title>
    
    <!-- PWA Icons Placeholder -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234F46E5' width='100' height='100'/></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?v=3.4.16"></script>
    <script>
        tailwind.config = {
            safelist: [
                'bg-indigo-600', 'text-indigo-600', 'border-indigo-600', 'bg-indigo-50', 'hover:bg-indigo-700', 'focus:ring-indigo-500',
                'bg-blue-800', 'text-blue-800', 'border-blue-800', 'bg-blue-50', 'hover:bg-blue-900', 'focus:ring-blue-500',
                'bg-emerald-600', 'text-emerald-600', 'border-emerald-600', 'bg-emerald-50', 'hover:bg-emerald-700', 'focus:ring-emerald-500',
                'bg-amber-700', 'text-amber-700', 'border-amber-700', 'bg-amber-50', 'hover:bg-amber-800', 'focus:ring-amber-500',
                'bg-mesh-default', 'bg-mesh-math', 'bg-mesh-sci', 'bg-mesh-kor'
            ]
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- 모바일 vh 최적화 스크립트 -->
    <script>
        const setVH = () => document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', () => setTimeout(setVH, 100));
        setVH();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans KR', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 동적 테마 배경 메쉬 */
        .bg-mesh-default { background: linear-gradient(-45deg, #e0e7ff, #f3e8ff, #fae8ff, #dbeafe); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        .bg-mesh-math { background: linear-gradient(-45deg, #dbeafe, #eff6ff, #e0e7ff, #bfdbfe); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        .bg-mesh-sci { background: linear-gradient(-45deg, #d1fae5, #ecfdf5, #a7f3d0, #e0f2fe); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        .bg-mesh-kor { background: linear-gradient(-45deg, #ffedd5, #fff7ed, #fef3c7, #ffedd5); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .app-container { min-height: 100vh; min-height: calc(var(--vh, 1vh) * 100); }
    </style>
</head>
<body class="text-slate-800 app-container pb-[env(safe-area-inset-bottom)] pt-[env(safe-area-inset-top)] pl-[env(safe-area-inset-left)] pr-[env(safe-area-inset-right)] transition-colors duration-500" id="body-wrapper">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useCallback } = React;

        // ==========================================
        // ⚙️ 전역 상수
        // ==========================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6G_5UnzspgsspJeZ1lPG_j4yKnGK1xrhMSetQATT64OjW9lrw90jqNbj5sCriE-LR/exec";
        const SHEET_NAME = "응답수합";

        // 테마별 색상 설정
        const THEMES = {
            default: { prefix: 'default', bg: 'bg-indigo-600', text: 'text-indigo-600', border: 'border-indigo-600', lightBg: 'bg-indigo-50', hover: 'hover:bg-indigo-700', ring: 'focus:ring-indigo-500' },
            math: { prefix: 'math', bg: 'bg-blue-800', text: 'text-blue-800', border: 'border-blue-800', lightBg: 'bg-blue-50', hover: 'hover:bg-blue-900', ring: 'focus:ring-blue-500' },
            sci: { prefix: 'sci', bg: 'bg-emerald-600', text: 'text-emerald-600', border: 'border-emerald-600', lightBg: 'bg-emerald-50', hover: 'hover:bg-emerald-700', ring: 'focus:ring-emerald-500' },
            kor: { prefix: 'kor', bg: 'bg-amber-700', text: 'text-amber-700', border: 'border-amber-700', lightBg: 'bg-amber-50', hover: 'hover:bg-amber-800', ring: 'focus:ring-amber-500' },
        };

        const getTheme = (code, defaultSettingTheme) => {
            if (!code) return THEMES[defaultSettingTheme] || THEMES.default;
            const prefix = code.toLowerCase().split('-')[0];
            return THEMES[prefix] || THEMES[defaultSettingTheme] || THEMES.default;
        };

        // GAS 미연동 시 보여줄 MOCK 데이터
        const MOCK_QUESTIONS = [
            { id: 'q1', testCode: 'test-01', type: 'ox', points: 10, text: '구글 시트 연동을 완료하면 이 문항들은 사라집니다.', correctAnswer: 'O' }
        ];
        const MOCK_SETTINGS = { '앱제목': '스마트 평가 시스템', '랜덤출제': 'O', '기본테마': 'default' };

        // --- SVG Icons ---
        const Icons = {
            Settings: () => <svg className="w-5 h-5 min-w-[20px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>,
            Alert: () => <svg className="w-12 h-12 text-amber-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>,
            Question: () => <svg className="w-12 h-12 text-blue-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Check: () => <svg className="w-16 h-16 text-emerald-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Spinner: () => <svg className="animate-spin w-10 h-10 text-gray-500 mx-auto mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>,
            Copy: () => <svg className="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2 2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>,
            X: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>,
            Pen: () => <svg className="w-10 h-10 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>,
            Audio: () => <svg className="w-12 h-12 mb-2 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>,
            Up: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 15l7-7 7 7"></path></svg>,
            Down: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>,
            Book: () => <svg className="w-6 h-6 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        };

        const copyToClipboard = (text, onSuccess, onError) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess, onError));
            } else { fallbackCopy(text, onSuccess, onError); }
        };

        const fallbackCopy = (text, onSuccess, onError) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.left = "-999999px";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy') ? onSuccess() : onError(); } catch (err) { onError(); }
            document.body.removeChild(textArea);
        };

        // --- Drawing Pad 컴포넌트 ---
        const DrawingPad = ({ onReady, theme, initialData = null, readOnly = false }) => {
            const canvasRef = useRef(null);
            const ctxRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const lastPos = useRef({ x: 0, y: 0, time: 0 });
            
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctxRef.current = ctx;

                const resize = () => {
                    const rect = canvas.getBoundingClientRect();
                    const dpr = window.devicePixelRatio || 1;
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.scale(dpr, dpr);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, rect.width, rect.height);
                    if (initialData) {
                        const img = new Image();
                        img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
                        img.src = initialData;
                    }
                };
                resize();
                if (!readOnly) window.addEventListener('resize', resize);
                
                if (onReady) {
                    onReady({
                        canvas,
                        getCompressedData: () => {
                            const tempCanvas = document.createElement('canvas');
                            tempCanvas.width = 400; 
                            tempCanvas.height = canvas.height * (400 / canvas.width);
                            const tCtx = tempCanvas.getContext('2d');
                            tCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
                            return tempCanvas.toDataURL('image/jpeg', 0.5); 
                        },
                        clear: () => {
                            ctx.fillStyle = '#ffffff';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                    });
                }
                return () => window.removeEventListener('resize', resize);
            }, [onReady, initialData, readOnly]);

            const getPos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                // 1. 테두리 두께(border-2 = 2px)만큼의 물리적 오차 제거
                const borderWidth = 2;
                
                // 2. 모바일 주소창 숨김 등에 의한 화면 찌그러짐(비율) 보정 계산
                const dpr = window.devicePixelRatio || 1;
                const scaleX = canvas.width / rect.width / dpr;
                const scaleY = canvas.height / rect.height / dpr;

                // 최종적으로 보정된 정확한 캔버스 내부 좌표
                const x = (clientX - rect.left - borderWidth) * scaleX;
                const y = (clientY - rect.top - borderWidth) * scaleY;

                return { x, y, time: Date.now() };
            };

            const startDraw = (e) => { if(readOnly) return; e.preventDefault(); setIsDrawing(true); lastPos.current = getPos(e); };
            const draw = (e) => {
                if (!isDrawing || readOnly) return;
                e.preventDefault();
                const ctx = ctxRef.current;
                const currPos = getPos(e);
                const dx = currPos.x - lastPos.current.x, dy = currPos.y - lastPos.current.y, dt = currPos.time - lastPos.current.time;
                const velocity = dt > 0 ? Math.sqrt(dx * dx + dy * dy) / dt : 0;
                ctx.lineWidth = Math.max(2, 6 - velocity * 2);
                ctx.strokeStyle = '#1e293b';
                ctx.beginPath();
                ctx.moveTo(lastPos.current.x, lastPos.current.y);
                ctx.lineTo(currPos.x, currPos.y);
                ctx.stroke();
                lastPos.current = currPos;
            };
            const endDraw = (e) => { if(!readOnly) { e.preventDefault(); setIsDrawing(false); } };

            return (
                <canvas ref={canvasRef} onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
                    onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
                    className={`w-full min-h-[280px] border-2 border-dashed rounded-2xl bg-white shadow-inner ${readOnly ? 'pointer-events-none' : 'cursor-crosshair'} ${theme.border}`}
                    style={{ touchAction: 'none' }} 
                />
            );
        };

        const App = () => {
            const [view, setViewInternal] = useState('intro'); // intro -> quiz -> signature -> result -> review
            
            const [student, setStudent] = useState({ id: '', name: '', testCode: '' });
            const [originalQuestions, setOriginalQuestions] = useState(null);
            
            // 시트에서 불러온 전역 앱 설정값 상태
            const [appSettings, setAppSettings] = useState({
                title: '스마트 평가 시스템',
                isRandom: false,
                defaultTheme: 'default'
            });

            const [questions, setQuestions] = useState(null);
            const [answers, setAnswers] = useState({});
            const [currentQIndex, setCurrentQIndex] = useState(0);
            
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(null);
            const [theme, setTheme] = useState(THEMES.default);
            
            const [isLoading, setIsLoading] = useState(false);
            const [isFetching, setIsFetching] = useState(true);
            const [alertData, setAlertData] = useState({ isOpen: false, msg: '', title: '', type: 'alert', onConfirm: null });
            const [showGuide, setShowGuide] = useState(false);
            
            const drawingPadRefs = useRef({}); 

            const navigate = useCallback((newView) => {
                window.history.pushState({ view: newView }, '');
                setViewInternal(newView);
                window.scrollTo(0,0);
            }, []);

            useEffect(() => {
                const handlePopState = (e) => setViewInternal(e.state?.view || 'intro');
                window.history.replaceState({ view: 'intro' }, ''); 
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const handleBeforeUnload = (e) => { if (view === 'quiz' || view === 'signature') { e.preventDefault(); e.returnValue = ''; } };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [view]);

            // 테마 동기화 (Body 배경색 변경)
            useEffect(() => {
                const body = document.getElementById('body-wrapper');
                body.className = `text-slate-800 app-container pb-[env(safe-area-inset-bottom)] pt-[env(safe-area-inset-top)] pl-[env(safe-area-inset-left)] pr-[env(safe-area-inset-right)] transition-colors duration-500 bg-mesh-${theme.prefix}`;
            }, [theme]);

            const showModal = (msg, title = '알림', type = 'alert', onConfirm = null) => setAlertData({ isOpen: true, msg, title, type, onConfirm });
            const closeModal = () => setAlertData({ isOpen: false, msg: '', title: '', type: 'alert', onConfirm: null });

            const fetchWithTimeout = async (resource, options = {}) => {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 8000);
                const response = await fetch(resource, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            };

            // 초기 데이터 로드 (문항 + 환경설정)
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const res = await fetchWithTimeout(GOOGLE_SCRIPT_URL);
                        const data = await res.json();
                        
                        if (data.questions && data.questions.length > 0) {
                            setOriginalQuestions(data.questions);
                        } else {
                            throw new Error('문항 없음');
                        }

                        // 시트에서 기본설정 탭을 성공적으로 읽어왔을 경우
                        if (data.settings) {
                            setAppSettings({
                                title: data.settings['앱제목'] || '스마트 평가 시스템',
                                isRandom: data.settings['랜덤출제'] === 'O' || data.settings['랜덤출제'] === 'TRUE' || data.settings['랜덤출제'] === true,
                                defaultTheme: data.settings['기본테마'] || 'default'
                            });
                            document.title = data.settings['앱제목'] || '스마트 평가 시스템';
                        }
                    } catch (error) {
                        setOriginalQuestions(MOCK_QUESTIONS);
                        setAppSettings({
                            title: MOCK_SETTINGS['앱제목'],
                            isRandom: MOCK_SETTINGS['랜덤출제'] === 'O',
                            defaultTheme: MOCK_SETTINGS['기본테마']
                        });
                    } finally {
                        setIsFetching(false);
                    }
                };
                fetchData();
            }, []);

            // 임시저장
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (view === 'quiz' && questions) {
                        localStorage.setItem('draft_eval', JSON.stringify({ student, answers, timeLeft, qIds: questions.map(q=>q.id) }));
                    }
                }, 1000);
                return () => clearTimeout(timer);
            }, [answers, timeLeft, questions, view, student]);

            // 타이머
            useEffect(() => {
                let timerId;
                if (view === 'quiz' && timeLeft !== null && timeLeft > 0 && !isLoading) {
                    timerId = setInterval(() => setTimeLeft(p => p - 1), 1000);
                } else if (timeLeft === 0 && view === 'quiz') {
                    showModal('제한 시간이 종료되어 서명 단계로 이동합니다.', '시간 종료', 'alert', () => navigate('signature'));
                    setTimeLeft(null); 
                }
                return () => clearInterval(timerId);
            }, [view, timeLeft, isLoading, navigate]);

            const handleStart = () => {
                if (!student.id.trim() || !student.name.trim() || !student.testCode.trim()) {
                    showModal('학번, 이름, 시험 코드를 모두 입력해주세요.');
                    return;
                }
                if (!originalQuestions || originalQuestions.length === 0) { showModal('불러온 문항이 없습니다.'); return; }

                // 대소문자 구분 없이 비교하기 위해 입력값과 시트값을 모두 소문자로 변환하여 비교
                const targetCode = student.testCode.trim().toLowerCase();
                let activeQuestions = originalQuestions.filter(q => (q.testCode || '').toString().trim().toLowerCase() === targetCode);
                
                if(activeQuestions.length === 0) {
                    showModal(`입력하신 시험 코드(${student.testCode.trim()})에 해당하는 문항이 없습니다.`);
                    return;
                }

                // 테마 적용 (시험코드 접두사 우선 -> 설정 시트의 기본테마 순으로 폴백)
                const newTheme = getTheme(targetCode, appSettings.defaultTheme);
                setTheme(newTheme);

                const draftData = localStorage.getItem('draft_eval');
                const draft = draftData ? JSON.parse(draftData) : null;

                if (draft && draft.student.id === student.id && (draft.student.testCode || '').trim().toLowerCase() === targetCode) {
                    showModal('작성 중이던 데이터가 있습니다. 이어서 하시겠습니까?', '임시저장 복원', 'confirm', () => {
                        const ordered = [];
                        draft.qIds.forEach(id => { const q = activeQuestions.find(x => x.id === id); if(q) ordered.push(q); });
                        activeQuestions.forEach(q => { if (!draft.qIds.includes(q.id)) ordered.push(q); });
                        
                        setQuestions(ordered);
                        setAnswers(draft.answers || {});
                        setTimeLeft(draft.timeLeft !== null ? draft.timeLeft : null);
                        setCurrentQIndex(0); navigate('quiz'); closeModal();
                    });
                } else {
                    // 환경설정의 랜덤출제 값(isRandom) 반영
                    if (appSettings.isRandom) {
                        activeQuestions.sort(() => Math.random() - 0.5);
                    }
                    setQuestions(activeQuestions);
                    
                    const initialAnswers = {};
                    activeQuestions.forEach(q => {
                        if (q.type === 'ordering') initialAnswers[q.id] = [...(q.options || [])];
                        if (q.type === 'fill-in') {
                            const parts = q.text.split(/\[\s*\]/);
                            initialAnswers[q.id] = new Array(parts.length - 1).fill('');
                        }
                    });
                    setAnswers(initialAnswers);
                    
                    const totalTime = activeQuestions.reduce((sum, q) => sum + (Number(q.timeLimit) || 0), 0);
                    setTimeLeft(totalTime > 0 ? totalTime : null);
                    
                    setCurrentQIndex(0); navigate('quiz');
                }
            };

            const handleAnswer = (val, qId) => {
                const targetId = qId || questions[currentQIndex].id;
                setAnswers(prev => ({ ...prev, [targetId]: val }));
            };

            const saveDrawingAnswers = () => {
                const newAnswers = { ...answers };
                questions.forEach(q => {
                    if (q.type === 'drawing' && drawingPadRefs.current[q.id]) {
                        newAnswers[q.id] = drawingPadRefs.current[q.id].getCompressedData();
                    }
                });
                setAnswers(newAnswers);
                return newAnswers;
            };

            const moveToSignature = () => {
                saveDrawingAnswers(); 
                
                const unAnswered = questions.some(q => {
                    if (q.type === 'essay' || q.type === 'drawing') return false; 
                    const val = answers[q.id];
                    if (val === undefined || val === null) return true; 
                    if (Array.isArray(val)) {
                        if (val.length === 0) return true;
                        if (q.type === 'fill-in' && val.some(v => v.toString().trim() === '')) return true;
                        return false;
                    }
                    return val.toString().trim() === '';
                });

                if (unAnswered) {
                    showModal('풀지 않은 문제가 있습니다.\n그래도 서명 단계로 넘어가시겠습니까?', '제출 확인', 'confirm', () => { navigate('signature'); closeModal(); });
                } else { navigate('signature'); }
            };

            const submitFinal = async () => {
                if (isLoading) return;

                // 🌟 중요: 서명은 실제 시트에 부하를 주지 않도록 하드코딩된 텍스트만 전송합니다.
                let signBase64 = "서명완료";

                let currentScore = 0;
                questions.forEach(q => {
                    if (q.correctAnswer && answers[q.id]) {
                        let stuAns = answers[q.id];
                        if (Array.isArray(stuAns)) stuAns = stuAns.join(',').trim().toLowerCase();
                        else stuAns = stuAns.toString().trim().toLowerCase();
                        
                        const corAns = q.correctAnswer.toString().trim().toLowerCase();
                        if (stuAns === corAns) currentScore += Number(q.points) || 0;
                    }
                });
                setScore(currentScore);

                setIsLoading(true);
                try {
                    const payload = {
                        studentId: student.id, studentName: student.name, testCode: student.testCode,
                        score: currentScore, signature: signBase64, answers: answers
                    };
                    await fetchWithTimeout(GOOGLE_SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    localStorage.removeItem('draft_eval');
                    navigate('result');
                } catch (error) {
                    showModal('네트워크 오류. 전송에 실패했습니다.', '서버 에러');
                } finally { setIsLoading(false); }
            };

            // --- 문항 렌더러 ---
            const renderOrdering = (q, val) => {
                const items = Array.isArray(val) && val.length > 0 ? val : [...(q.options || [])];
                const move = (idx, dir) => {
                    if ((dir === -1 && idx === 0) || (dir === 1 && idx === items.length - 1)) return;
                    const newItems = [...items];
                    [newItems[idx], newItems[idx + dir]] = [newItems[idx + dir], newItems[idx]];
                    handleAnswer(newItems, q.id);
                };

                return (
                    <div className="space-y-3">
                        {items.map((item, idx) => (
                            <div key={idx} className={`flex items-center justify-between p-4 rounded-2xl border-2 bg-white shadow-sm ${theme.border}`}>
                                <span className="font-bold text-lg text-gray-800 ml-2">{idx + 1}. {item}</span>
                                <div className="flex flex-col gap-1">
                                    <button onClick={() => move(idx, -1)} disabled={idx === 0} className={`p-2 rounded-lg ${idx === 0 ? 'text-gray-300' : `${theme.text} hover:bg-gray-100`}`}><Icons.Up /></button>
                                    <button onClick={() => move(idx, 1)} disabled={idx === items.length - 1} className={`p-2 rounded-lg ${idx === items.length - 1 ? 'text-gray-300' : `${theme.text} hover:bg-gray-100`}`}><Icons.Down /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            const renderFillIn = (q, val) => {
                const parts = q.text.split(/\[\s*\]/);
                const ansArray = Array.isArray(val) ? val : new Array(parts.length - 1).fill('');
                
                const handleChange = (idx, text) => {
                    const newAns = [...ansArray];
                    newAns[idx] = text;
                    handleAnswer(newAns, q.id);
                };

                return (
                    <div className="leading-loose text-xl text-gray-800 font-bold bg-white/60 p-6 rounded-2xl border border-white shadow-sm break-keep">
                        {parts.map((part, i) => (
                            <React.Fragment key={i}>
                                {part}
                                {i < parts.length - 1 && (
                                    <input type="text" className={`mx-2 p-1 border-b-4 outline-none w-24 text-center bg-transparent transition-colors ${theme.text} border-gray-300 focus:${theme.border}`}
                                        value={ansArray[i] || ''} onChange={e => handleChange(i, e.target.value)} placeholder="빈칸" />
                                )}
                            </React.Fragment>
                        ))}
                    </div>
                );
            };

            const renderMedia = (url) => {
                if (!url) return null;
                const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))((\w|-){11})/);
                if (ytMatch) return (<div className="relative w-full pb-[56.25%] mb-6 rounded-2xl overflow-hidden shadow-sm"><iframe className="absolute top-0 left-0 w-full h-full" src={`https://www.youtube.com/embed/${ytMatch[1]}`} allowFullScreen></iframe></div>);
                
                const audioMatch = url.match(/\.(mp3|wav|ogg)(?:[\?#].*)?$/i) || url.includes('#audio');
                if (audioMatch) {
                    const src = url.includes('drive.google.com') ? `https://drive.google.com/uc?export=download&id=${url.match(/id=([a-zA-Z0-9_-]+)/)?.[1]}` : url.replace('#audio','');
                    return (<div className={`mb-6 p-6 flex flex-col items-center rounded-2xl ${theme.lightBg} border ${theme.border}`}><Icons.Audio /><audio controls className="w-full max-w-sm mt-3" src={src}></audio></div>);
                }
                
                // 구글 드라이브 이미지 폴백 추가
                let imgSrc = url;
                if (url.includes('drive.google.com/file/d/')) {
                    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                    if (match && match[1]) {
                        imgSrc = `https://drive.google.com/uc?export=view&id=${match[1]}`;
                    }
                } else if (url.includes('drive.google.com/open?id=')) {
                    const match = url.match(/id=([a-zA-Z0-9_-]+)/);
                    if (match && match[1]) {
                         imgSrc = `https://drive.google.com/uc?export=view&id=${match[1]}`;
                    }
                } else {
                    // 한글/공백이 포함된 일반 URL(Vercel 등) 안전 처리
                    try { imgSrc = encodeURI(decodeURI(url)); } catch(e) {}
                }
                
                // 에러 발생 시 숨기지 않고 '이미지 깨짐' 아이콘을 보여주어 링크 오류 확인 가능하도록 수정
                return (<img src={imgSrc} className="mb-6 max-w-full h-auto max-h-[400px] object-contain rounded-2xl shadow-sm bg-white/50" 
                    onError={(e)=>{ 
                        e.target.onerror = null; 
                        e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%23cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline><line x1="3" y1="3" x2="21" y2="21" stroke="%23ef4444"></line></svg>'; 
                        e.target.classList.add('border-red-200', 'border-2');
                    }} 
                />);
            };

            // 통합 모달 컴포넌트 렌더러 함수
            const renderCustomModal = () => {
                if (!alertData.isOpen) return null;
                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                        <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center transform transition-all border border-white/20">
                            {alertData.type === 'confirm' ? <Icons.Question /> : <Icons.Alert />}
                            <h3 className="text-xl font-bold text-gray-900 mb-3 tracking-tight">{alertData.title}</h3>
                            <p className="text-gray-600 mb-8 whitespace-pre-line leading-relaxed font-medium">{alertData.msg}</p>
                            <div className="flex gap-3">
                                {alertData.type === 'confirm' && (
                                    <button onClick={closeModal} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3.5 rounded-xl min-h-[44px]">취소</button>
                                )}
                                <button onClick={() => { if(alertData.onConfirm) alertData.onConfirm(); else closeModal(); }} className="flex-1 bg-indigo-600 text-white font-bold py-3.5 rounded-xl min-h-[44px] shadow-md">확인</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // 관리자 설정 가이드 모달
            const renderAdminGuideModal = () => {
                if (!showGuide) return null;
                const scriptCode = `function doGet(e) {
  try {
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    
    // 1. 문항설정 읽기
    var qSheet = ss.getSheetByName("문항설정");
    if (!qSheet) throw new Error("'문항설정' 시트가 필요합니다.");
    var qData = qSheet.getDataRange().getValues();
    var qHeaders = qData[0];
    var questions = [];
    for (var i = 1; i < qData.length; i++) {
      var row = qData[i];
      var q = {};
      for (var j = 0; j < qHeaders.length; j++) {
        q[qHeaders[j]] = row[j];
      }
      if (q.type === 'multiple' && q.options) {
        q.options = q.options.toString().split(',').map(function(s) { return s.trim(); });
      }
      if (q.id) questions.push(q);
    }
    
    // 2. 기본설정 읽기
    var sSheet = ss.getSheetByName("기본설정");
    var settings = {};
    if (sSheet) {
      var sData = sSheet.getDataRange().getValues();
      for (var k = 1; k < sData.length; k++) {
        if(sData[k][0]) {
          settings[sData[k][0].toString().trim()] = sData[k][1];
        }
      }
    }
    
    return ContentService.createTextOutput(JSON.stringify({"questions": questions, "settings": settings}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(error) {
    return ContentService.createTextOutput(JSON.stringify({"error": error.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function doPost(e) {
  try {
    var sheetName = "${SHEET_NAME}";
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName(sheetName) || ss.insertSheet(sheetName);
    
    var data = JSON.parse(e.postData.contents);
    var payload = Object.assign({
      "timestamp": new Date(), "studentId": data.studentId, "studentName": data.studentName, "testCode": data.testCode, "score": data.score, "signature": data.signature
    }, data.answers);
    
    var headers = [], lastCol = sheet.getLastColumn();
    if (lastCol === 0) {
      headers = Object.keys(payload);
      var headerRange = sheet.getRange(1, 1, 1, headers.length);
      headerRange.setValues([headers]).setFontWeight("bold").setBackground("#f3f4f6");
    } else {
      headers = sheet.getRange(1, 1, 1, lastCol).getValues()[0];
    }
    
    var payloadKeys = Object.keys(payload);
    for (var i = 0; i < payloadKeys.length; i++) {
      if (headers.indexOf(payloadKeys[i]) === -1) {
        headers.push(payloadKeys[i]);
        sheet.getRange(1, headers.length).setValue(payloadKeys[i]).setFontWeight("bold").setBackground("#f3f4f6");
      }
    }
    
    var rowData = headers.map(function(h) { return payload[h] !== undefined ? payload[h] : ""; });
    sheet.appendRow(rowData);
    
    return ContentService.createTextOutput(JSON.stringify({"result": "success"})).setMimeType(ContentService.MimeType.JSON);
  } catch(error) {
    return ContentService.createTextOutput(JSON.stringify({"error": error.toString()})).setMimeType(ContentService.MimeType.JSON);
  }
}`;
                return (
                    <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm fade-in">
                        <div className="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden pb-[env(safe-area-inset-bottom)] border border-white/20 shadow-2xl">
                            <div className="flex justify-between items-center p-6 border-b bg-gray-50/50">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2 text-lg"><Icons.Settings /> 관리자 연동 설정</h3>
                                <button onClick={() => setShowGuide(false)} className="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-200 rounded-full transition-colors"><Icons.X /></button>
                            </div>
                            <div className="p-6 overflow-y-auto flex-1 text-sm text-gray-700 space-y-4">
                                <p><strong>1. 구글 시트 세팅 안내</strong></p>
                                <ul className="list-disc pl-5 space-y-1 text-gray-600 bg-gray-50 p-4 rounded-xl border border-gray-200">
                                    <li><strong>문항설정</strong> 시트: <code>id, testCode, type, text...</code> 열 작성</li>
                                    <li><strong>기본설정</strong> 시트 (새로 만들기): <code>A열(항목) / B열(값)</code><br/>
                                        - 앱제목 : (원하는 시험 이름)<br/>
                                        - 랜덤출제 : O (또는 X)<br/>
                                        - 기본테마 : default, math, sci, kor 중 택 1
                                    </li>
                                </ul>
                                <p className="pt-2"><strong>2. 앱스 스크립트 코드 교체</strong></p>
                                <div className="relative group">
                                    <pre className="bg-slate-800 text-green-400 p-4 rounded-xl overflow-x-auto text-xs max-h-64 leading-relaxed shadow-inner">{scriptCode}</pre>
                                    <button onClick={() => copyToClipboard(scriptCode, () => showModal('복사되었습니다.'), () => showModal('복사 실패'))} className="absolute top-3 right-3 bg-white/20 hover:bg-white/30 transition-colors text-white px-3 py-1.5 rounded-lg flex items-center text-xs font-bold backdrop-blur-sm"><Icons.Copy /> 복사</button>
                                </div>
                            </div>
                            <div className="text-center pb-5 pt-2 text-xs font-bold text-gray-400">Created by Yang DH</div>
                        </div>
                    </div>
                );
            };

            // 뷰 렌더링
            const renderIntro = () => (
                <div className="w-full max-w-md mx-auto bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-6 sm:p-8 mt-10 border border-white flex flex-col fade-in">
                    <h1 className={`text-3xl font-black text-center mb-6 tracking-tight text-gray-800`}>{appSettings.title}</h1>
                    {isFetching ? (
                        <div className="py-10 text-center"><Icons.Spinner /><p className="text-gray-500 font-bold">시스템 환경 설정 중...</p></div>
                    ) : (
                        <div className="space-y-5">
                            <div><label className="block text-sm font-bold text-gray-700 mb-2 ml-1">학번</label><input type="text" className={`w-full px-4 py-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none transition-all text-lg focus:bg-white ${theme.ring} focus:ring-2`} placeholder="예: 2101" value={student.id} onChange={e => setStudent({...student, id: e.target.value})} /></div>
                            <div><label className="block text-sm font-bold text-gray-700 mb-2 ml-1">이름</label><input type="text" className={`w-full px-4 py-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none transition-all text-lg focus:bg-white ${theme.ring} focus:ring-2`} placeholder="예: 홍길동" value={student.name} onChange={e => setStudent({...student, name: e.target.value})} /></div>
                            <div><label className="block text-sm font-bold text-gray-700 mb-2 ml-1">시험 코드</label><input type="text" className={`w-full px-4 py-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none transition-all text-lg focus:bg-white ${theme.ring} focus:ring-2 uppercase`} placeholder="예: MATH-01" value={student.testCode} onChange={e => setStudent({...student, testCode: e.target.value})} onKeyPress={e => e.key === 'Enter' && handleStart()}/></div>
                            <button onClick={handleStart} className={`w-full mt-4 ${theme.bg} text-white font-black text-lg py-4 rounded-2xl active:scale-95 transition-transform shadow-lg`}>평가 시작하기</button>
                        </div>
                    )}
                </div>
            );

            const renderQuiz = () => {
                if (!questions) return null;
                const q = questions[currentQIndex];
                const val = answers[q.id];
                const progress = ((currentQIndex) / questions.length) * 100;

                return (
                    <div className="w-full max-w-screen-md mx-auto bg-white/95 backdrop-blur-xl rounded-3xl shadow-xl flex flex-col flex-1 mt-4 sm:mt-10 mb-4 overflow-hidden fade-in border border-white">
                        <div className="px-5 py-4 border-b border-gray-100 flex flex-wrap items-center justify-between gap-3 bg-white">
                            <div className={`font-black text-xl ${theme.text}`}>Q{currentQIndex + 1}. <span className="text-gray-400 text-sm">/ {questions.length}</span></div>
                            <div className="flex gap-3">
                                {timeLeft !== null && (<div className={`font-bold px-4 py-1.5 rounded-full text-sm flex items-center ${timeLeft < 60 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-gray-100 text-gray-700'}`}>⏱ {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}</div>)}
                            </div>
                        </div>
                        <div className="w-full bg-gray-100 h-1.5"><div className={`${theme.bg} h-1.5 transition-all duration-300`} style={{ width: `${progress}%` }}></div></div>
                        
                        <div className="p-5 sm:p-8 flex-1 flex flex-col overflow-y-auto no-scrollbar">
                            <div className="flex justify-between items-start gap-4 mb-6">
                                <h2 className="text-xl sm:text-2xl font-bold text-gray-800 leading-relaxed break-keep">
                                    {q.type === 'fill-in' ? "다음 빈칸을 채우시오." : q.text}
                                </h2>
                                <span className={`text-sm font-bold px-3 py-1.5 rounded-xl h-fit whitespace-nowrap ${theme.lightBg} ${theme.text}`}>{q.points}점</span>
                            </div>

                            {renderMedia(q.media)}

                            {q.type === 'ox' && (
                                <div className="flex gap-4">
                                    <button onClick={() => handleAnswer('O')} className={`flex-1 py-12 rounded-3xl border-4 text-6xl font-black transition-all ${val === 'O' ? `${theme.border} ${theme.lightBg} ${theme.text}` : 'border-gray-100 text-gray-300'}`}>O</button>
                                    <button onClick={() => handleAnswer('X')} className={`flex-1 py-12 rounded-3xl border-4 text-6xl font-black transition-all ${val === 'X' ? 'border-red-400 bg-red-50 text-red-500' : 'border-gray-100 text-gray-300'}`}>X</button>
                                </div>
                            )}
                            {q.type === 'multiple' && (
                                <div className="space-y-3">
                                    {q.options.map((opt, idx) => (
                                        <button key={idx} onClick={() => handleAnswer(opt)} className={`w-full text-left p-5 rounded-2xl border-2 transition-all flex items-center min-h-[56px] ${val === opt ? `${theme.border} ${theme.lightBg} font-bold ${theme.text}` : 'border-gray-200 bg-white font-medium text-gray-700 hover:bg-gray-50'}`}>
                                            <div className={`w-6 h-6 rounded-full border-2 mr-4 flex items-center justify-center ${val === opt ? theme.border : 'border-gray-300'}`}>{val === opt && <div className={`w-3 h-3 rounded-full ${theme.bg}`}></div>}</div>
                                            <span className="text-lg">{opt}</span>
                                        </button>
                                    ))}
                                </div>
                            )}
                            {q.type === 'short' && (<input type="text" className={`w-full p-5 text-xl font-bold border-2 border-gray-200 bg-gray-50 rounded-2xl focus:bg-white outline-none ${theme.ring} focus:ring-2`} placeholder="정답 입력" value={val||''} onChange={e => handleAnswer(e.target.value)} />)}
                            {q.type === 'essay' && (<textarea className={`w-full h-48 p-5 text-lg border-2 border-gray-200 bg-gray-50 rounded-2xl focus:bg-white outline-none resize-none leading-relaxed ${theme.ring} focus:ring-2`} placeholder="자유롭게 서술하세요..." value={val||''} onChange={e => handleAnswer(e.target.value)}></textarea>)}
                            
                            {/* 신규 유형 렌더링 */}
                            {q.type === 'ordering' && renderOrdering(q, val)}
                            {q.type === 'fill-in' && renderFillIn(q, val)}
                            {q.type === 'drawing' && (
                                <div>
                                    <p className="text-sm text-gray-500 font-bold mb-2">💡 아래 영역에 직접 손이나 펜으로 그려주세요.</p>
                                    <DrawingPad theme={theme} initialData={val} onReady={(helpers) => { drawingPadRefs.current[q.id] = helpers; }} />
                                    <button onClick={() => drawingPadRefs.current[q.id]?.clear()} className="mt-3 px-4 py-2 bg-gray-100 text-gray-600 rounded-xl font-bold text-sm">다시 그리기 (지우기)</button>
                                </div>
                            )}
                        </div>

                        <div className="px-5 py-4 border-t border-gray-100 flex gap-3 bg-white pb-[calc(1rem+env(safe-area-inset-bottom))]">
                            <button onClick={() => { saveDrawingAnswers(); setCurrentQIndex(p => p - 1); }} disabled={currentQIndex === 0} className={`px-6 py-4 rounded-2xl font-bold text-lg min-h-[56px] ${currentQIndex === 0 ? 'bg-gray-100 text-gray-400' : 'bg-white border-2 border-gray-200 text-gray-700'}`}>이전</button>
                            <button onClick={() => { currentQIndex === questions.length - 1 ? moveToSignature() : setCurrentQIndex(p => {saveDrawingAnswers(); return p + 1;}) }} className={`flex-1 ${theme.bg} text-white font-black text-lg py-4 rounded-2xl active:scale-95 transition-transform min-h-[56px] shadow-lg`}>
                                {currentQIndex === questions.length - 1 ? '제출 전 서명하기' : '다음 문제'}
                            </button>
                        </div>
                    </div>
                );
            };

            const renderSignature = () => (
                <div className="w-full max-w-md mx-auto bg-white/95 backdrop-blur-xl rounded-3xl shadow-xl flex flex-col fade-in mt-10 border border-white">
                    <div className="p-8 text-center border-b border-gray-100">
                        <Icons.Pen />
                        <h2 className="text-2xl font-black text-gray-800">최종 확인 서명</h2>
                        <p className="text-sm font-bold text-gray-500 mt-2">본인이 직접 평가에 응시했음을 확인합니다.</p>
                    </div>
                    <div className="p-6 bg-slate-50 rounded-b-3xl">
                        <DrawingPad theme={theme} onReady={(helpers) => { drawingPadRefs.current['signature'] = helpers; }} />
                        <div className="flex justify-between mt-4 gap-3">
                            <button onClick={() => drawingPadRefs.current['signature']?.clear()} className="px-5 py-4 bg-white border-2 border-gray-200 text-gray-600 rounded-2xl font-bold active:scale-95">지우기</button>
                            <button onClick={submitFinal} className={`flex-1 ${theme.bg} text-white font-black text-lg py-4 rounded-2xl shadow-lg active:scale-95 transition-transform`}>최종 제출하기</button>
                        </div>
                    </div>
                </div>
            );

            const renderResult = () => (
                <div className="w-full max-w-md mx-auto bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-8 text-center fade-in mt-10 sm:mt-20 border border-white">
                    <Icons.Check />
                    <h2 className="text-3xl font-black text-gray-800 mb-2">제출 완료!</h2>
                    <p className="text-gray-500 mb-8 font-bold">수고하셨습니다. 응답이 안전하게 기록되었습니다.</p>
                    
                    <div className="bg-gray-50 border border-gray-100 rounded-3xl p-6 mb-8 text-base text-gray-700 text-left space-y-4 shadow-inner">
                        <div className="flex justify-between border-b border-gray-200 pb-3"><span className="text-gray-500 font-bold">시험 코드</span><span className={`font-black ${theme.text} uppercase`}>{student.testCode}</span></div>
                        <div className="flex justify-between border-b border-gray-200 pb-3"><span className="text-gray-500 font-bold">이름</span><span className="font-black text-gray-800">{student.name}</span></div>
                        <div className="flex justify-between pb-1"><span className="text-gray-500 font-bold">자동 채점 결과</span><span className={`font-black text-2xl ${theme.text}`}>{score}점</span></div>
                    </div>
                    
                    <div className="flex flex-col gap-3">
                        <button onClick={() => navigate('review')} className={`w-full ${theme.lightBg} ${theme.text} font-black py-4 rounded-2xl flex items-center justify-center active:scale-95 transition-transform`}>
                            <Icons.Book /> 오답 노트 및 해설 보기
                        </button>
                        <button onClick={() => window.location.reload()} className="w-full bg-slate-800 text-white font-black py-4 rounded-2xl active:scale-95 transition-transform">처음으로 돌아가기</button>
                    </div>
                </div>
            );

            // 오답 해설지 (Review Mode)
            const renderReview = () => (
                <div className="w-full max-w-screen-md mx-auto bg-white/95 backdrop-blur-xl rounded-3xl shadow-xl flex flex-col flex-1 mt-4 sm:mt-10 mb-4 overflow-hidden fade-in border border-white">
                    <div className={`px-6 py-5 border-b border-gray-100 bg-white sticky top-0 z-10 flex justify-between items-center shadow-sm`}>
                        <h2 className={`text-2xl font-black ${theme.text}`}>오답 노트 및 해설</h2>
                        <button onClick={() => navigate('result')} className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-xl font-bold text-sm">닫기</button>
                    </div>
                    <div className="p-4 sm:p-6 flex-1 overflow-y-auto space-y-6 bg-gray-50">
                        {questions.map((q, i) => {
                            let stuAns = answers[q.id];
                            if (Array.isArray(stuAns)) stuAns = stuAns.join(', ').trim();
                            else stuAns = (stuAns || '').toString().trim();
                            
                            const corAns = (q.correctAnswer || '').toString().trim();
                            // 서술형, 그리기 등 자동채점 불가 항목은 회색 처리
                            const isManualScore = q.type === 'essay' || q.type === 'drawing';
                            const isCorrect = !isManualScore && (stuAns.toLowerCase() === corAns.toLowerCase());

                            return (
                                <div key={q.id} className="bg-white p-5 rounded-3xl border border-gray-200 shadow-sm">
                                    <div className="flex gap-3 items-start mb-4">
                                        <div className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-black text-white ${isManualScore ? 'bg-gray-400' : isCorrect ? 'bg-emerald-500' : 'bg-red-500'}`}>
                                            {isManualScore ? '-' : isCorrect ? 'O' : 'X'}
                                        </div>
                                        <h3 className="text-lg font-bold text-gray-800 leading-relaxed mt-0.5">{i+1}. {q.text}</h3>
                                    </div>
                                    
                                    {q.type === 'drawing' && stuAns && (
                                        <div className="mb-4 p-3 bg-gray-50 rounded-xl"><p className="text-xs text-gray-500 font-bold mb-2">제출한 그림:</p><img src={stuAns} className="max-w-full rounded-lg border border-gray-200 bg-white" /></div>
                                    )}

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                                        <div className={`p-4 rounded-2xl border ${isCorrect ? 'bg-emerald-50 border-emerald-200' : isManualScore ? 'bg-gray-50 border-gray-200' : 'bg-red-50 border-red-200'}`}>
                                            <span className="block text-xs font-bold text-gray-500 mb-1">나의 답안</span>
                                            <span className={`font-bold ${isCorrect ? 'text-emerald-700' : isManualScore ? 'text-gray-700' : 'text-red-700'}`}>{stuAns || '(미입력)'}</span>
                                        </div>
                                        {!isManualScore && (
                                            <div className="p-4 rounded-2xl bg-blue-50 border border-blue-200">
                                                <span className="block text-xs font-bold text-blue-500 mb-1">정답</span>
                                                <span className="font-bold text-blue-800">{corAns}</span>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {q.explanation && (
                                        <div className="p-4 rounded-2xl bg-slate-800 text-gray-100">
                                            <span className="block text-xs font-black text-amber-400 mb-1">💡 해설</span>
                                            <p className="text-sm font-medium leading-relaxed">{q.explanation}</p>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col relative px-4 max-w-screen-xl mx-auto">
                    {view === 'intro' && renderIntro()}
                    {view === 'quiz' && renderQuiz()}
                    {view === 'signature' && renderSignature()}
                    {view === 'result' && renderResult()}
                    {view === 'review' && renderReview()}

                    {view !== 'quiz' && view !== 'signature' && view !== 'review' && (
                        <button onClick={() => setShowGuide(true)} className="fixed bottom-[calc(1.5rem+env(safe-area-inset-bottom))] right-6 bg-white/95 backdrop-blur border border-gray-200 shadow-xl px-5 py-3.5 rounded-full flex items-center gap-2 font-black text-sm text-gray-700 z-40 active:scale-95 transition-transform">
                            <Icons.Settings /> 설정 가이드
                        </button>
                    )}

                    {renderCustomModal()}
                    {renderAdminGuideModal()}
                    {isLoading && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-white/80 backdrop-blur fade-in"><div className="text-center"><Icons.Spinner /><p className={`font-black ${theme.text} mt-2 text-lg`}>데이터 전송 중...</p></div></div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
